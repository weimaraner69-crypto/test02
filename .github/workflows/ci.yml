# =============================================================================
# CI ワークフロー（汎用テンプレート）
# =============================================================================
# このファイルはプロジェクトの言語・ツールに合わせてカスタマイズしてください。
# bootstrap.sh 実行時に project-config.yml の設定で自動置換されます。
#
# 対応例:
#   Python (uv)     → uv sync / uv run ruff / uv run mypy / uv run pytest
#   Node.js (pnpm)  → pnpm install / pnpm lint / pnpm typecheck / pnpm test
#   Rust (cargo)    → cargo build / cargo clippy / cargo test
#   Go              → go build / golangci-lint run / go test

name: CI

on:
  pull_request:
  push:
    branches: [ main, staging ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ（プロジェクトに合わせて1つ選択）
      # ---------------------------------------------------------------
      # 注意: サードパーティ Action は本番利用時に必ずコミットハッシュで
      # 固定すること（タグ指定は禁止）。以下のコメントアウト例はタグ指定
      # のままであるため、利用時にハッシュに置換する必要がある。

      # --- Python ---
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        if: hashFiles('pyproject.toml') != ''
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        if: hashFiles('pyproject.toml') != ''
        with:
          enable-cache: true
      - name: Sync dependencies
        if: hashFiles('pyproject.toml') != ''
        run: uv sync --all-extras --dev

      # --- Node.js ---
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      # - name: Install dependencies
      #   run: npm ci

      # --- Rust ---
      # - uses: dtolnay/rust-toolchain@stable
      # - uses: Swatinem/rust-cache@v2

      # --- Go ---
      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: "1.22"

      # ---------------------------------------------------------------
      # 品質チェック（プロジェクトに合わせてコメント解除・編集）
      # ---------------------------------------------------------------

      - name: Policy check
        run: python ci/policy_check.py

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest -q --tb=short --cov --cov-report=term-missing
          --cov-fail-under=80

      # ---------------------------------------------------------------
      # ミューテーションテスト（非ブロッキング）
      # ---------------------------------------------------------------
      # テストの有効性を検証するためにミューテーションテストを実行する。
      # 現時点では品質指標として参考情報を収集するのみであり、CI をブロックしない。
      - name: Mutation testing (mutmut)
        if: hashFiles('pyproject.toml') != ''
        continue-on-error: true
        run: |
          uv run mutmut run --no-progress 2>&1
          uv run mutmut results

      # ---------------------------------------------------------------
      # セキュリティ: 依存パッケージ脆弱性スキャン
      # ---------------------------------------------------------------
      - name: Audit dependencies (pip-audit)
        if: hashFiles('pyproject.toml') != ''
        # 前提: 上記の uv sync による依存インストールが実行済みであること
        run: |
          uv pip install pip-audit --system
          pip-audit -r <(uv pip freeze) --strict --progress-spinner=off
      # ---------------------------------------------------------------
      # OpenTelemetry 計装確認（observability オプション有効時）
      # ---------------------------------------------------------------
      # 計装を有効化したプロジェクトでのみコメント解除すること。
      # 前提: uv sync --extra observability で OTel SDK がインストール済み。
      # - name: OpenTelemetry 計装確認
      #   env:
      #     OTEL_SERVICE_NAME: ${{ github.repository }}
      #     OTEL_EXPORTER_OTLP_ENDPOINT: "stdout"  # CI環境では標準出力へエクスポート
      #   run: |
      #     {{RUN_PREFIX}} python -c "
      #     from src.observability.tracing import get_tracer
      #     tracer = get_tracer()
      #     if tracer is not None:
      #         with tracer.start_as_current_span('ci-smoke-test'):
      #             pass
      #         print('OTel 計装の初期化: OK')
      #     else:
      #         print('OTel SDK 未インストール — スキップ')
      #     "

      # =====================================================================
      # シークレットスキャン（gitleaks）
      # =====================================================================
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
