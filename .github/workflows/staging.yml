# =============================================================================
# Staging ワークフロー（検証環境デプロイ・テスト）
# =============================================================================
# staging ブランチへの push 時に、品質ゲート + 統合テスト + 性能テストを実行する。
# プロジェクトの言語・ツールに合わせてカスタマイズしてください。

name: Staging

on:
  push:
    branches: [staging]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ（ci.yml と同じ設定を使用）
